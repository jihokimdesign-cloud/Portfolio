<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  fontFamily: { display: ['"Plus Jakarta Sans"','sans-serif'], body: ['"DM Sans"','sans-serif'] },
  colors: { accent: '#ea580c' } } } }
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0f172a;font-family:'DM Sans',sans-serif}
  body{display:flex;align-items:center;justify-content:center;padding:24px}
  .mockup-ipad{width:440px;height:300px;border-radius:16px;border:3px solid #d1d5db;background:#111;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
  .mockup-cam{position:absolute;top:50%;left:8px;transform:translateY(-50%);width:7px;height:7px;background:#333;border-radius:50%;z-index:10}
  .proximity-active{animation:proximity-pulse 1.5s ease-in-out infinite}
  @keyframes proximity-pulse{0%{box-shadow:0 0 0 0 rgba(234,88,12,0.4)}70%{box-shadow:0 0 0 20px rgba(234,88,12,0)}100%{box-shadow:0 0 0 0 rgba(234,88,12,0)}}
</style>
</head>
<body>
  <div class="w-full max-w-4xl">
    <div class="flex flex-col md:flex-row items-center justify-center gap-6 lg:gap-14">
      <!-- Default UI iPad -->
      <div class="text-center flex-shrink-0">
        <div class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Default UI</div>
        <div class="mockup-ipad" style="transform:scale(0.82);">
          <div class="mockup-cam"></div>
          <div class="flex h-full">
            <div class="flex-1 bg-gray-800 flex items-center justify-center">
              <svg width="36" height="36" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <div class="w-[140px] bg-gray-900 p-3 flex flex-col justify-center border-l border-gray-700">
              <div class="text-white text-[10px] font-medium mb-1">Kimchi Jjigae</div>
              <div class="text-gray-400 text-[8px] mb-2">Step 3/8 · Sauté aromatics</div>
              <div class="h-1 bg-gray-700 rounded-full mb-3"><div class="h-full bg-accent rounded-full" style="width:37%"></div></div>
              <div class="flex flex-col gap-1">
                <button class="text-gray-400 text-[8px] py-1 rounded bg-gray-800/50">◀ Prev</button>
                <button class="text-white text-[8px] py-1 rounded bg-gray-700">Pause</button>
                <button class="text-gray-400 text-[8px] py-1 rounded bg-gray-800/50">Next ▶</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Arrow -->
      <div class="flex flex-col items-center gap-2 flex-shrink-0">
        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/20">
          <svg class="w-5 h-5 text-white/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
        </div>
        <div class="text-[9px] text-gray-500 text-center">Proximity<br>Triggered</div>
      </div>
      <!-- Elbow-Bump Mode iPad -->
      <div class="text-center flex-shrink-0">
        <div class="text-xs font-medium text-accent uppercase tracking-wider mb-3">Elbow-Bump Mode</div>
        <div class="mockup-ipad proximity-active" style="transform:scale(0.82);">
          <div class="mockup-cam"></div>
          <div class="flex h-full relative">
            <div class="flex-1 bg-gray-800 flex items-center justify-center">
              <svg width="36" height="36" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </div>
            <div class="absolute inset-y-0 right-0 w-[55%] flex flex-col items-center justify-center" style="background:linear-gradient(to left, rgba(234,88,12,0.9), rgba(234,88,12,0.4), transparent);">
              <div class="text-white/70 text-[8px] font-medium tracking-wider uppercase mb-1">Elbow-Bump Mode</div>
              <div class="w-[140px] h-[100px] rounded-xl bg-white/20 backdrop-blur-sm border-2 border-white/40 flex items-center justify-center">
                <span class="text-white text-base font-bold font-display">Next Step →</span>
              </div>
              <div class="text-white/50 text-[8px] mt-1">Tap anywhere</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
