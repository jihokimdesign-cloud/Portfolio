<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAP3D — AI Agent Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#0069E4; --blue-lt:#4899FF; --gray:#76848D; --border:#DBDDE0;
    --tile:#F4F6F8; --cyan:#2BD9D9; --sub:#4C6EA4; --dur:11s;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:transparent}
  body{font-family:'Poppins',Inter,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

  .frame{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:16px;background:#EDF0F3}
  .stage{position:absolute;top:0;left:0;width:1280px;height:720px;transform-origin:top left}
  .loop{position:absolute;inset:0;animation:loopFade var(--dur) ease infinite}
  @keyframes loopFade{0%,1%{opacity:0}4%,95%{opacity:1}99.5%,100%{opacity:0}}

  /* ============ CAMERA ============ */
  .cam{position:absolute;top:0;left:0;width:1320px;height:1155px;will-change:transform;
    transform-origin:0 0;animation:camera var(--dur) infinite cubic-bezier(.6,0,.18,1)}
  @keyframes camera{
    0%,22%  {transform:translate(191px,52px) scale(.68)}
    30%,52% {transform:translate(-126px,-251px) scale(1.19)}
    60%,100%{transform:translate(-126px,-549px) scale(1.19)}
  }

  /* the real page */
  .world{position:absolute;top:0;left:0;width:1320px;height:1155px;
    filter:drop-shadow(0 24px 60px rgba(0,52,122,.18))}
  .report-asset{position:absolute;left:110px;top:360px;width:1069px;height:auto}

  /* ============ LIVE OVERLAYS (world coordinates) ============ */
  .patch{position:absolute;background:var(--tile)}
  .p-n0{left:135px;top:512px;width:300px;height:54px}
  .p-n1{left:479px;top:512px;width:300px;height:54px}
  .p-n2{left:822px;top:512px;width:300px;height:54px}
  .num{position:absolute;top:509px;font-size:50px;font-weight:600;color:var(--blue);
    line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:0}
  .num.a{left:149px}.num.b{left:494px}.num.c{left:838px}

  @property --a{syntax:"<integer>";inherits:false;initial-value:0}
  @property --b{syntax:"<integer>";inherits:false;initial-value:0}
  @property --c{syntax:"<integer>";inherits:false;initial-value:0}
  .num.a{animation:countA var(--dur) ease-out infinite;counter-reset:a var(--a)}
  .num.a::before{content:counter(a)}
  @keyframes countA{0%,30%{--a:0}48%,100%{--a:22}}
  .num.b{animation:countB var(--dur) ease-out infinite;counter-reset:b var(--b)}
  .num.b::before{content:"+" counter(b)}
  @keyframes countB{0%,32%{--b:0}48%,100%{--b:3}}
  .num.c{animation:countC var(--dur) ease-out infinite;counter-reset:c var(--c)}
  .num.c::before{content:counter(c) "%"}
  @keyframes countC{0%,34%{--c:0}50%,100%{--c:60}}

  /* checklist sub-line */
  .p-sub{left:133px;top:670px;width:360px;height:28px;background:#fff}
  .sub{position:absolute;left:135px;top:671px;font-size:13.5px;font-weight:600;
    color:var(--sub);width:420px;height:22px}
  .sub span{position:absolute;left:0;top:0;white-space:nowrap}
  .s1{animation:s1 var(--dur) step-end infinite}
  .s2{opacity:0;animation:s2 var(--dur) step-end infinite}
  .s3{opacity:0;animation:s3 var(--dur) step-end infinite}
  @keyframes s1{0%,64%{opacity:1}64.5%,100%{opacity:0}}
  @keyframes s2{0%,64%{opacity:0}64.5%,74%{opacity:1}74.5%,100%{opacity:0}}
  @keyframes s3{0%,74%{opacity:0}74.5%,100%{opacity:1}}

  /* progress bar */
  .bar{position:absolute;left:135px;top:711px;width:1017px;height:7px;border-radius:4px;
    background:#E5EBF4;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:4px;background:var(--blue);
    animation:barFill var(--dur) cubic-bezier(.5,0,.2,1) infinite}
  @keyframes barFill{0%,63%{width:567px}67%,73%{width:763px}77%,100%{width:1017px}}

  /* rings */
  .p-r1{left:145px;top:752px;width:30px;height:30px;border-radius:8px;background:#F9FAFB}
  .p-r2{left:145px;top:816px;width:30px;height:30px;border-radius:8px;background:#F9FAFB}
  .ring{position:absolute;width:22px;height:22px;border-radius:50%}
  .r1{left:149px;top:756px;border:2px solid var(--blue-lt);background:#CCE1FA}
  .r2{left:149px;top:820px;border:2px solid #9AA3AC;background:#fff}
  .fill{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--blue);
    color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800;opacity:0}
  .f1{left:149px;top:756px;animation:tick1 var(--dur) cubic-bezier(.34,1.6,.5,1) infinite}
  .f2{left:149px;top:820px;animation:tick2 var(--dur) cubic-bezier(.34,1.6,.5,1) infinite}
  @keyframes tick1{0%,62%{opacity:0;transform:scale(.4)}65%,100%{opacity:1;transform:scale(1)}}
  @keyframes tick2{0%,72%{opacity:0;transform:scale(.4)}75%,100%{opacity:1;transform:scale(1)}}

  /* strikethroughs over baked task labels */
  .strike{position:absolute;height:2px;background:#9AA3AC;width:0}
  .k1{left:186px;top:768px;animation:strike1 var(--dur) ease infinite}
  .k2{left:186px;top:832px;animation:strike2 var(--dur) ease infinite}
  @keyframes strike1{0%,64%{width:0}68%,100%{width:221px}}
  @keyframes strike2{0%,74%{width:0}78%,100%{width:145px}}

  /* ============ MASCOT OVERLAY (viewport-fixed) ============ */
  .bot{position:absolute;left:54px;bottom:44px;width:196px;
    filter:drop-shadow(0 14px 24px rgba(0,52,122,.22));
    animation:botAct var(--dur) cubic-bezier(.34,1.45,.45,1) infinite;transform-origin:50% 100%}
  .bot img{width:100%;height:auto;display:block}
  @keyframes botAct{
    0%,9%   {transform:translateY(0) scale(1)}
    10.5%   {transform:translateY(-30px) scale(1.04,.98)}
    12%     {transform:translateY(0) scale(1.03,.94)}
    13.5%,77%{transform:translateY(0) scale(1)}
    78.5%   {transform:translateY(-22px)}
    80%     {transform:translateY(0) scale(1.02,.95)}
    81.5%   {transform:translateY(-14px)}
    83%,100%{transform:translateY(0) scale(1)}
  }
  .shock{position:absolute;left:196px;bottom:214px;width:46px;height:46px;border-radius:50%;
    background:var(--blue);color:#fff;display:grid;place-items:center;
    font-size:26px;font-weight:900;opacity:0;transform-origin:20% 90%;
    animation:shock var(--dur) cubic-bezier(.34,1.7,.5,1) infinite}
  @keyframes shock{0%,9.5%{opacity:0;transform:scale(.2) rotate(-14deg)}
    12%{opacity:1;transform:scale(1.12) rotate(6deg)}
    13.5%,20%{opacity:1;transform:scale(1) rotate(0)}
    23%,100%{opacity:0;transform:scale(.6)}}

  .bubble{position:absolute;left:70px;bottom:262px;background:#fff;border:1px solid var(--border);
    border-radius:15px;border-bottom-left-radius:4px;padding:14px 19px;
    font-size:17px;font-weight:600;color:#20262C;box-shadow:0 12px 30px rgba(0,52,122,.14);
    opacity:0;transform-origin:10% 100%;
    animation:bubbleIn var(--dur) cubic-bezier(.34,1.5,.5,1) infinite}
  .bubble b{color:var(--blue)}
  @keyframes bubbleIn{0%,14%{opacity:0;transform:scale(.7) translateY(14px)}
    18%,50%{opacity:1;transform:scale(1) translateY(0)}
    55%,100%{opacity:0;transform:scale(.94) translateY(-8px)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    .loop{opacity:1}
    .cam{transform:translate(-126px,-549px) scale(1.19)}
    .num.a{--a:22}.num.b{--b:3}.num.c{--c:60}
    .bar i{width:1017px}
    .s1,.s2{opacity:0}.s3{opacity:1}
    .f1,.f2{opacity:1;transform:none}
    .k1{width:221px}.k2{width:145px}
    .bubble,.shock{opacity:0}
  }
</style>
</head>
