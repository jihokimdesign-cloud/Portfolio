<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheffy — Landing Thumbnail</title>
<style>
  .frame.dark{
    --bg:#111827; --frameline:#1F2937; --txt:#E5E7EB; --mut:#9CA3AF; --dim:#6B7280;
    --sidebg:#111827; --sideline:#374151; --title:#fff; --steptxt:#9CA3AF;
    --btnbg:rgba(31,41,55,.55); --btntxt:#9CA3AF; --pausebg:#374151; --pausetxt:#fff;
    --track:#374151; --glow:rgba(234,88,12,.10);
  }
  .frame.light{
    --bg:#F8FAFC; --frameline:#E2E8F0; --txt:#0F172A; --mut:#64748B; --dim:#94A3B8;
    --sidebg:#FFFFFF; --sideline:#E2E8F0; --title:#0F172A; --steptxt:#64748B;
    --btnbg:#F1F5F9; --btntxt:#64748B; --pausebg:#E2E8F0; --pausetxt:#0F172A;
    --track:#E2E8F0; --glow:rgba(234,88,12,.07);
  }
  :root{
    --accent:#EA580C; --red:#F87171; --amber:#FBBF24; --green:#34D399; --dur:9s;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:transparent}
  body{font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}

  .frame{position:relative;width:100%;aspect-ratio:582/767;overflow:hidden;border-radius:16px;
    background:var(--bg);border:1px solid var(--frameline)}
  .frame::before{content:"";position:absolute;inset:0;
    background:radial-gradient(70% 45% at 80% 8%, var(--glow), transparent 70%)}
  .stage{position:absolute;top:0;left:0;width:582px;height:767px;transform-origin:top left}
  .loop{position:absolute;inset:0;animation:loopFade var(--dur) ease infinite}
  @keyframes loopFade{0%,1%{opacity:0}5%,94%{opacity:1}99.5%,100%{opacity:0}}

  .eyebrow{position:absolute;top:34px;left:34px;display:flex;align-items:center;gap:10px}
  .mark{width:24px;height:24px;border-radius:7px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-size:13px;font-weight:800}
  .eyebrow .txt{font-size:14px;font-weight:800;letter-spacing:.12em;color:var(--txt)}
  .eyebrow .txt em{font-style:normal;color:var(--dim);font-weight:600}

  /* ================= iPad ================= */
  .ipad{position:absolute;left:18px;top:186px;width:546px;height:396px;border-radius:26px;
    background:#0B0F19;border:1px solid #2A3444;padding:15px;
    box-shadow:0 24px 54px rgba(2,6,23,.35), inset 0 0 0 2px #060910;
    animation:frameGlow var(--dur) ease infinite}
  @keyframes frameGlow{
    0%,33%{box-shadow:0 24px 54px rgba(2,6,23,.35), inset 0 0 0 2px #060910}
    38%,64%{box-shadow:0 24px 54px rgba(2,6,23,.35), 0 0 34px rgba(234,88,12,.30), inset 0 0 0 2px #060910}
    70%,100%{box-shadow:0 24px 54px rgba(2,6,23,.35), inset 0 0 0 2px #060910}
  }
  .cam{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:6px;height:6px;
    border-radius:50%;background:#2A3444}
  .screen{position:relative;width:100%;height:100%;border-radius:12px;overflow:hidden;
    background:#1F2937;display:flex}

  /* video pane — stays dark in both themes (it's video content) */
  .video{flex:1;position:relative;overflow:hidden;
    background:linear-gradient(160deg,#26313F 0%,#1B232E 55%,#141B24 100%)}
  .video .steam{position:absolute;inset:0;
    background:radial-gradient(55% 45% at 50% 62%, rgba(234,88,12,.16), transparent 70%)}
  .pan{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);width:150px;height:150px;
    border-radius:50%;background:radial-gradient(circle at 42% 38%, #3A4656, #232C38 68%);
    box-shadow:inset 0 0 0 9px #10161E, 0 8px 22px rgba(0,0,0,.4)}
  .pan::after{content:"";position:absolute;inset:26px;border-radius:50%;
    background:radial-gradient(circle at 45% 40%, rgba(234,88,12,.55), rgba(234,88,12,.14) 70%);
    filter:blur(2px)}
  .timer{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.5);color:#fff;
    font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:99px;letter-spacing:.04em}
  .vcap{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.5);color:rgba(255,255,255,.9);
    font-size:10px;font-weight:600;padding:5px 10px;border-radius:8px}
  .play{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);width:44px;height:44px;
    border-radius:50%;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.3);
    display:grid;place-items:center;animation:playPulse 2.25s ease-in-out infinite}
  .play svg{margin-left:3px}
  @keyframes playPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.07)}}

  /* in-screen signal HUD (the product tells the story) */
  .hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;
    gap:9px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);border-radius:99px;
    padding:6px 12px;border:1px solid rgba(255,255,255,.12);z-index:3}
  .sig{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;color:rgba(255,255,255,.85)}
  .sig .x{opacity:0}
  .g1 .x{color:var(--red);animation:sig1 var(--dur) step-end infinite}
  .g2 .x{color:var(--amber);animation:sig2 var(--dur) step-end infinite}
  .g3 .x{color:var(--green);animation:sig3 var(--dur) step-end infinite}
  @keyframes sig1{0%,13%{opacity:0}14%,100%{opacity:1}}
  @keyframes sig2{0%,20%{opacity:0}21%,100%{opacity:1}}
  @keyframes sig3{0%,27%{opacity:0}28%,100%{opacity:1}}
  .hud .sep{width:1px;height:12px;background:rgba(255,255,255,.2)}
  .hud .mode{font-size:9.5px;font-weight:800;letter-spacing:.1em;color:rgba(255,255,255,.4);
    animation:modeOn var(--dur) step-end infinite}
  @keyframes modeOn{0%,32%{color:rgba(255,255,255,.4)}33%,66%{color:#FDBA74}67%,100%{color:rgba(255,255,255,.4)}}

  /* sidebar — themed */
  .side{width:158px;background:var(--sidebg);border-left:1px solid var(--sideline);
    padding:16px 14px;display:flex;flex-direction:column;justify-content:center}
  .brandrow{display:flex;align-items:center;gap:6px;margin-bottom:10px}
  .brandrow .mark{width:16px;height:16px;border-radius:5px;font-size:9px}
  .brandrow .bn{font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--txt)}
  .side .title{color:var(--title);font-size:13.5px;font-weight:700;margin-bottom:4px}
  .stepline{position:relative;height:13px;margin-bottom:10px;font-size:9.5px;color:var(--steptxt)}
  .stepline span{position:absolute;left:0;top:0;white-space:nowrap}
  .sp1{animation:sp1 var(--dur) step-end infinite}
  .sp2{opacity:0;animation:sp2 var(--dur) step-end infinite}
  @keyframes sp1{0%,49%{opacity:1}49.5%,100%{opacity:0}}
  @keyframes sp2{0%,49%{opacity:0}49.5%,100%{opacity:1}}
  .pbar{height:4px;background:var(--track);border-radius:99px;margin-bottom:14px;overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:99px;background:var(--accent);
    animation:pfill var(--dur) cubic-bezier(.5,0,.2,1) infinite}
  @keyframes pfill{0%,48%{width:37%}53%,100%{width:50%}}
  .btns{display:flex;flex-direction:column;gap:6px}
  .btn{font-size:9.5px;font-weight:600;padding:6px 0;border-radius:6px;text-align:center;
    color:var(--btntxt);background:var(--btnbg)}
  .btn.pause{color:var(--pausetxt);background:var(--pausebg)}

  /* proximity arcs */
  .arcs{position:absolute;right:-26px;top:50%;transform:translateY(-50%);width:86px;height:170px;
    opacity:0;animation:arcsIn var(--dur) ease infinite;z-index:2}
  @keyframes arcsIn{0%,25%{opacity:0}28%,36%{opacity:1}40%,100%{opacity:0}}
  .arcs span{position:absolute;right:22px;top:50%;border:2.5px solid var(--accent);
    border-radius:50%;border-right-color:transparent;border-top-color:transparent;
    transform:translateY(-50%) rotate(45deg)}
  .arcs span:nth-child(1){width:26px;height:26px;animation:ping 1.1s ease-out infinite}
  .arcs span:nth-child(2){width:50px;height:50px;animation:ping 1.1s .18s ease-out infinite}
  .arcs span:nth-child(3){width:76px;height:76px;animation:ping 1.1s .36s ease-out infinite}
  @keyframes ping{0%{opacity:.2}45%{opacity:1}100%{opacity:.15}}

  /* Elbow-Bump overlay */
  .overlay{position:absolute;top:0;right:0;bottom:0;width:55%;z-index:2;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(to left, rgba(234,88,12,.9), rgba(234,88,12,.4), transparent);
    transform:translateX(103%);animation:ovIn var(--dur) infinite cubic-bezier(.22,.9,.3,1)}
  @keyframes ovIn{
    0%,33%{transform:translateX(103%)}
    37%,62%{transform:translateX(0)}
    68%,100%{transform:translateX(103%)}
  }
  .ov-label{color:rgba(255,255,255,.8);font-size:9.5px;font-weight:700;
    letter-spacing:.17em;text-transform:uppercase;margin-bottom:8px}
  .bigbtn{position:relative;width:196px;height:118px;border-radius:14px;background:rgba(255,255,255,.2);
    border:2px solid rgba(255,255,255,.45);backdrop-filter:blur(4px);
    display:grid;place-items:center;color:#fff;font-size:19px;font-weight:800;
    animation:bump var(--dur) ease infinite}
  @keyframes bump{0%,46%{transform:scale(1)}47.5%{transform:scale(.93)}49%,100%{transform:scale(1)}}
  .flash{position:absolute;inset:0;background:rgba(255,255,255,.45);opacity:0;
    animation:flash var(--dur) ease-out infinite;border-radius:14px}
  @keyframes flash{0%,47%{opacity:0}48.5%{opacity:1}52%,100%{opacity:0}}
  .ov-hint{color:rgba(255,255,255,.6);font-size:9.5px;margin-top:8px}


  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    .loop{opacity:1}
    .overlay{transform:translateX(0)}
    .sig .x{opacity:1}
    .hud .mode{color:#FDBA74}
    .pbar i{width:50%}
    .sp1{opacity:0}.sp2{opacity:1}
    .arcs{opacity:0}
  }
</style>
</head>
<body>
<div class="frame light" id="frame">
  <div class="stage" id="stage">
    <div class="loop">

      <div class="eyebrow">
        <div class="mark">C</div>
        <div class="txt">CHEFFY <em>· HANDS-FREE COOKING</em></div>
      </div>

      <div class="ipad">
        <div class="cam"></div>
        <div class="screen">
          <div class="video">
            <div class="steam"></div>
            <div class="pan"></div>
            <div class="play"><svg width="19" height="19" fill="none" stroke="#fff" stroke-width="1.6" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            <div class="timer">12:40</div>
            <div class="vcap">Sauté the aromatics · 0:42</div>
            <div class="hud">
              <span class="sig g1">🎤<span class="x">✗</span></span>
              <span class="sig g2">👋<span class="x">✗</span></span>
              <span class="sig g3">📷<span class="x">✓</span></span>
              <span class="sep"></span>
              <span class="mode">ELBOW MODE</span>
            </div>
          </div>
          <div class="side">
            <div class="brandrow"><div class="mark">C</div><div class="bn">CHEFFY</div></div>
            <div class="title">Kimchi Jjigae</div>
            <div class="stepline">
              <span class="sp1">Step 3/8 · Sauté aromatics</span>
              <span class="sp2">Step 4/8 · Add gochugaru</span>
            </div>
            <div class="pbar"><i></i></div>
            <div class="btns">
              <div class="btn">◀ Prev</div>
              <div class="btn pause">Pause</div>
              <div class="btn">Next ▶</div>
            </div>
          </div>

          <div class="overlay">
            <div class="ov-label">Elbow-Bump Mode</div>
            <div class="bigbtn"><div class="flash"></div>Next Step →</div>
            <div class="ov-hint">Tap anywhere</div>
          </div>
        </div>
        <div class="arcs"><span></span><span></span><span></span></div>
      </div>


    </div>
  </div>
</div>

<script>
  const frame = document.getElementById('frame'), stage = document.getElementById('stage');
  const fit = () => { stage.style.transform = `scale(${frame.clientWidth / 582})`; };
  new ResizeObserver(fit).observe(frame); fit();
</script>
</body>
</html>
